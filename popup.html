<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="stash-container">
    <div class="title">
      Tab Stash
      <!--<span class="version-badge">v3.0</span>-->
    </div>

    <!-- Tab Selection Section -->
    <div class="tab-selection-header">
      <span class="section-label" style="margin-bottom: 0;">Select Tabs to Group:</span>
      <button id="toggleSelectAllBtn" type="button" class="text-link-btn">Unselect All</button>
    </div>

    <div id="tabList" class="tab-list-container">
      <!-- Tab checkboxes dynamically injected here -->
    </div>

    <!-- Animated Floating Label Input -->
    <label class="floating-label">
      <input type="text" id="groupName" class="input" placeholder=" " autocomplete="off">
      <span>Group Name</span>
    </label>

    <!-- Tag Color Selection (Updated Reference Swatches) -->
    <div class="color-picker-row">
      <label class="section-label" style="margin-bottom: 0;">Tag Color:</label>
      <div class="color-options" id="colorPicker">
        <div class="color-option selected" data-color="veranda-blue" style="background:#6BB1AD;" title="Veranda Blue"></div>
        <div class="color-option" data-color="sky-cloud" style="background:#A7BCBD;" title="Sky Cloud"></div>
        <div class="color-option" data-color="lychee" style="background:#EDECDB;" title="Lychee"></div>
        <div class="color-option" data-color="melon" style="background:#E5A9A9;" title="Melon"></div>
        <div class="color-option" data-color="cupid-pink" style="background:#E6748E;" title="Cupid Pink"></div>
      </div>
    </div>

    <!-- Primary Submit Button -->
    <button id="stashBtn" class="submit-btn">Stash Selected Tabs</button>
  </div>

  <hr class="divider">

  <div class="section-label">Saved Groups</div>
  <div id="stashList"></div>

  <script src="popup.js"></script>
</body>
</html>
