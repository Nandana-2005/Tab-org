<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <h2>Tab Stash <span>v2.0</span></h2>
  
  <div class="input-group">
    <input type="text" id="groupName" placeholder="Session Name (e.g. Research Paper)">
    
    <!-- Color picker selection for Chrome Tab Group -->
    <div class="color-picker" id="colorPicker">
      <span style="font-size: 11px; color: #666; margin-right: 4px;">Color:</span>
      <div class="color-option selected" data-color="blue" style="background:#1a73e8;"></div>
      <div class="color-option" data-color="red" style="background:#d93025;"></div>
      <div class="color-option" data-color="yellow" style="background:#f9ab00;"></div>
      <div class="color-option" data-color="green" style="background:#188038;"></div>
      <div class="color-option" data-color="purple" style="background:#a142f4;"></div>
      <div class="color-option" data-color="cyan" style="background:#24c1e0;"></div>
    </div>

    <button id="stashBtn">Stash Current Tabs</button>
  </div>

  <hr>

  <h3 style="font-size: 12px; color: #666; margin-bottom: 8px;">Saved Sessions</h3>
  <div id="stashList"></div>

  <script src="popup.js"></script>
</body>
</html>
