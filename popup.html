<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="stash-container">
    <div class="title">
      Tab Stash
      <span class="version-badge">v2.0</span>
    </div>

    <!-- Animated Floating Label Input -->
    <label class="floating-label">
      <input type="text" id="groupName" class="input" placeholder=" " autocomplete="off">
      <span>Group Name</span>
    </label>

    <div class="color-picker-row">
    <label>Tag Color:</label>
    <div class="color-options" id="colorPicker">
        <div class="color-option selected" data-color="mint" style="background:#6ee7b7;"></div>
        <div class="color-option" data-color="emerald" style="background:#34d399;"></div>
        <div class="color-option" data-color="green" style="background:#10b981;"></div>
        <div class="color-option" data-color="teal-green" style="background:#059669;"></div>
        <div class="color-option" data-color="dark-green" style="background:#047857;"></div>
    </div>
    </div>

    <!-- Green Primary Submit Button -->
    <button id="stashBtn" class="submit-btn">Stash Current Tabs</button>
  </div>

  <hr class="divider">

  <div class="section-label">Saved Sessions</div>
  <div id="stashList"></div>

  <script src="popup.js"></script>
</body>
</html>
